<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>My Tasks</h1>
      <span class="task-count" id="taskCount">0 tasks left</span>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="taskInput"
        placeholder="Add a new task and press Enter..."
        autocomplete="off"
      />
      <button id="addBtn">Add</button>
    </div>

    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="active">Active</button>
      <button class="tab" data-filter="done">Done</button>
    </div>

    <ul class="task-list" id="taskList"></ul>

    <div class="empty-state" id="emptyState">
      <p>No tasks here. Add one above!</p>
    </div>

    <footer class="app-footer" id="appFooter">
      <button id="clearDoneBtn">Clear completed</button>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
